</footer>

<script>
  (function(){
    var start = Date.now();
    var recEl = document.getElementById('rec-time');
    function pad(n){ return String(n).padStart(2,'0'); }
    function tickClock(){
      var s = Math.floor((Date.now() - start)/1000);
      var h = Math.floor(s/3600);
      var m = Math.floor((s%3600)/60);
      var sec = s%60;
      recEl.textContent = pad(h) + ':' + pad(m) + ':' + pad(sec);
    }
    setInterval(tickClock, 1000);

    var altEl = document.getElementById('hud-alt');
    var spdEl = document.getElementById('hud-spd');
    var gpsEl = document.getElementById('hud-gps');
    var batEl = document.getElementById('hud-bat');

    var alt = 64.2, spd = 12.4, lat = -19.4170, lon = -43.6080, bat = 76;
    var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function jitter(){
      alt = Math.max(20, alt + (Math.random()-0.5)*2.2);
      spd = Math.max(0, spd + (Math.random()-0.5)*1.6);
      lat += (Math.random()-0.5)*0.0006;
      lon += (Math.random()-0.5)*0.0006;
      bat = Math.max(11, bat - (Math.random()*0.06));

      altEl.textContent = alt.toFixed(1) + ' m';
      spdEl.textContent = spd.toFixed(1) + ' km/h';
      gpsEl.textContent = lat.toFixed(4) + ', ' + lon.toFixed(4);
      batEl.textContent = Math.round(bat) + '%';
    }

    if(!reduceMotion){
      setInterval(jitter, 1800);
    }
  })();
</script>

</body>
</html>
